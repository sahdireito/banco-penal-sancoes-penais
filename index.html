<script>
const QUESTOES = [
  {num:1, exame:"Questão — padrão FGV", titulo:"Regime Inicial de Cumprimento de Pena — Reclusão e Detenção", enunciado:"Lucas foi condenado definitivamente pela prática de dois crimes dolosos em concurso material: lesão corporal grave (reclusão) e ameaça (detenção). As penas foram somadas, totalizando 5 anos e 4 meses de reclusão. Lucas é primário e possui boas circunstâncias judiciais.", comando:"Considerando o caso narrado e as regras do Código Penal sobre regime inicial de cumprimento de pena, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "O regime inicial deve ser o fechado, pois a pena total supera 4 anos.", "B": "O regime inicial deve ser o semiaberto, pois a pena total é superior a 4 anos e não ultrapassa 8 anos, e Lucas é réu primário com boas circunstâncias judiciais.", "C": "O regime inicial deve ser o aberto, pois Lucas é primário e as circunstâncias judiciais são favoráveis.", "D": "O regime inicial deve ser o fechado para a pena de reclusão e o semiaberto para a pena de detenção, cumprindo-se as penas separadamente."}, fb:{"A": "Incorreta. O regime fechado é destinado a condenados com pena superior a 8 anos (réu primário) ou reincidentes com pena superior a 4 anos. Lucas tem 5 anos e 4 meses e é primário → regime semiaberto.", "B": "Correta! Art. 33, §2º, b, CP: o réu primário, cuja pena seja superior a 4 anos e não exceda a 8 anos, poderá, desde o princípio, cumpri-la em regime semiaberto. Lucas tem 5 anos e 4 meses de pena total, é primário e tem boas circunstâncias judiciais → regime inicial semiaberto.", "C": "Incorreta. O regime aberto é para condenados a pena igual ou inferior a 4 anos, desde que primários e com boas circunstâncias. A pena de Lucas (5 anos e 4 meses) supera esse limite.", "D": "Incorreta. As penas são somadas e cumpridas de forma unificada — não separadamente por crime. Além disso, a pena de detenção nunca admite regime fechado (art. 33, §1º, CP), mas o regime inicial é definido pelo montante total unificado."}, fund:"Art. 33, §2º, CP: a) reclusão > 8 anos: início em fechado (réu primário); b) reclusão > 4 e ≤ 8 anos: início em semiaberto (réu primário); c) reclusão ou detenção ≤ 4 anos: início em aberto (réu primário). Art. 33, §1º, CP: a detenção nunca começa em regime fechado.", caqui:"Régua do regime inicial para réu PRIMÁRIO: até 4 anos = aberto; mais de 4 até 8 anos = semiaberto; mais de 8 anos = fechado. Lucas tem 5 anos e 4 meses = semiaberto. E atenção: as penas se somam (art. 69 CP) e o regime é definido pelo total. Detenção nunca começa em fechado — mas aqui a pena total determina o regime, não o tipo de pena."},
  {num:2, exame:"Questão — padrão FGV", titulo:"Detenção e Vedação ao Regime Inicial Fechado", enunciado:"Patrícia foi condenada por crime culposo na direção de veículo automotor (Lei 9.503/97), apenado com detenção. A pena total aplicada foi de 3 anos de detenção. O juiz sentenciante, considerando a gravidade do fato e o clamor público, fixou o regime inicial fechado.", comando:"Sobre a decisão do juiz, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A decisão está correta, pois o juiz pode fixar qualquer regime com base na gravidade do fato concreto.", "B": "A decisão está correta, pois a Lei 9.503/97 autoriza o regime inicial fechado para crimes de trânsito.", "C": "A decisão está incorreta, pois a detenção não admite, em nenhuma hipótese, regime inicial fechado.", "D": "A decisão está incorreta, pois crimes culposos nunca admitem regime fechado, independentemente do tipo de pena."}, fb:{"A": "Incorreta. A gravidade abstrata do fato e o clamor público não são fundamentos válidos para fixação de regime mais gravoso — exige-se fundamentação concreta. Ademais, a detenção tem vedação legal ao regime fechado.", "B": "Incorreta. A Lei 9.503/97 não autoriza regime fechado para detenção — o CP estabelece a vedação para qualquer pena de detenção.", "C": "Correta! Art. 33, §1º, b, CP: a detenção deve ser cumprida em regime semiaberto ou aberto, SALVO necessidade de transferência a regime fechado. Isso significa que o regime INICIAL de detenção nunca pode ser o fechado. A transferência para o fechado só ocorre como regressão durante a execução.", "D": "Incorreta. Crimes culposos podem admitir regime fechado se a pena aplicada for de reclusão. O fundamento correto é que a DETENÇÃO veda o regime fechado inicial — não a culpa."}, fund:"Art. 33, §1º, b, CP: a detenção deve ser cumprida em regime semiaberto ou aberto, salvo a necessidade de transferência a regime fechado. O regime fechado nunca pode ser fixado como ponto de partida (regime inicial) para crime apenado com detenção.", caqui:"DETENÇÃO = nunca começa em fechado. Isso é regra constitucional e infraconstitucional. A juíza errou. A gravidade do fato pode ser considerada para fixar o regime, mas há um TETO: detenção = no máximo semiaberto no início. Regressão para fechado pode ocorrer durante a execução (por falta grave), mas nunca como ponto de partida."},
  {num:3, exame:"Questão — padrão FGV", titulo:"Substituição por Penas Restritivas de Direitos — Requisitos", enunciado:"Roberto foi condenado por estelionato doloso a 4 anos e 6 meses de reclusão, em regime inicial semiaberto. É primário com bons antecedentes. As circunstâncias judiciais são todas favoráveis.", comando:"Sobre a possibilidade de substituição da pena privativa de liberdade por penas restritivas de direitos, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A substituição não é cabível, pois a pena aplicada supera 4 anos.", "B": "A substituição é cabível, pois Roberto é tecnicamente primário e as circunstâncias são favoráveis.", "C": "A substituição é cabível, pois o crime de estelionato admite pena restritiva de direitos independentemente do quantum.", "D": "A substituição não é cabível, pois Roberto possui condenação anterior transitada em julgado por crime doloso."}, fb:{"A": "Correta! Art. 44, I, CP: a substituição por penas restritivas de direitos cabe quando a pena aplicada NÃO for superior a 4 anos (crimes dolosos). Roberto foi condenado a 4 anos e 6 meses — que supera o limite de 4 anos. Portanto, a substituição é INCABÍVEL para crimes dolosos com pena superior a 4 anos.", "B": "Incorreta. A substituição não é cabível para crimes dolosos com pena superior a 4 anos, independentemente da primariedade e das circunstâncias favoráveis (art. 44, I, CP).", "C": "Incorreta. Não existe essa regra para o estelionato — o limite de 4 anos do art. 44, I, CP aplica-se a qualquer crime doloso.", "D": "Incorreta. Roberto é primário com bons antecedentes — o impedimento não é a condenação anterior (que não existe), mas o quantum de pena (4 anos e 6 meses > 4 anos)."}, fund:"Art. 44, I, CP: pena ≤ 4 anos (crime doloso) ou qualquer pena (crime culposo). Art. 44, II, CP: não reincidente em crime doloso (ou reincidente mas não específico, e se a medida for socialmente recomendável). Art. 64, I, CP: período depurador — não prevalece condenação anterior se entre a data do cumprimento e a infração subsequente decorreu período > 5 anos.", caqui:"Substituição PRD doloso: pena ≤ 4 anos + não reincidente em crime doloso + circunstâncias favoráveis. Roberto tem 4 anos e 6 meses = ACIMA de 4 anos = sem substituição para crime doloso. Atenção: 4 anos e 6 meses supera o limite. Se fosse 3 anos e 11 meses, caberia. Uma linha tênue que a FGV adora explorar."},
  {num:4, exame:"Questão — padrão FGV", titulo:"Suspensão Condicional da Pena (Sursis)", enunciado:"Marta foi condenada por crime de ameaça (detenção de 1 a 6 meses) a 1 ano e 6 meses de detenção. É primária, com boas circunstâncias judiciais, não havendo indicativo de que a suspensão seja insuficiente para a prevenção e reprovação do crime.", comando:"Sobre o cabimento da suspensão condicional da pena no caso de Marta, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Não cabe suspensão condicional da pena, pois crimes de detenção não comportam o benefício.", "B": "Não cabe suspensão condicional da pena, pois a pena de 1 ano e 6 meses deve ser substituída obrigatoriamente por pena restritiva de direitos.", "C": "Cabe suspensão condicional da pena, desde que satisfeitos os requisitos do art. 77 do Código Penal.", "D": "Cabe suspensão condicional da pena, mas somente por meio de decisão do Ministério Público, que oferecerá proposta nos mesmos moldes da suspensão condicional do processo."}, fb:{"A": "Incorreta. O sursis não tem vedação para crimes de detenção — aplica-se a qualquer crime cuja pena privativa de liberdade não supere 2 anos.", "B": "Incorreta. A substituição por PRD e o sursis não são excludentes obrigatórios — embora a substituição por PRD seja preferível quando cabível, o sursis pode ser aplicado subsidiariamente. Além disso, não há obrigatoriedade absoluta de substituição.", "C": "Correta! Art. 77, CP: a execução da pena privativa de liberdade, não superior a 2 anos, poderá ser suspensa por 2 a 4 anos (sursis), desde que: (I) o condenado não seja reincidente em crime doloso; (II) a culpabilidade, os antecedentes, a conduta social, os motivos e as circunstâncias autorizem a concessão do benefício; (III) não seja indicada ou cabível a substituição por PRD. Marta tem pena de 1 ano e 6 meses, é primária, com boas circunstâncias → sursis cabível.", "D": "Incorreta. O sursis é decretado pelo juiz na sentença condenatória — não é proposta do MP. A proposta do MP existe na suspensão condicional do PROCESSO (art. 89, Lei 9.099/95) — instituto distinto."}, fund:"Art. 77, CP: sursis simples — pena ≤ 2 anos; não reincidente em crime doloso; circunstâncias favoráveis; não indicada substituição por PRD. Período de prova: 2 a 4 anos. Art. 77, §1º: condenação anterior à pena de multa não impede o sursis.", caqui:"Sursis (suspensão condicional da PENA) vs sursis processual (suspensão condicional do PROCESSO): são institutos DIFERENTES. Sursis da pena = juiz concede na sentença após condenação. Sursis processual = MP propõe antes de condenar. Marta: pena de 1 ano e 6 meses (≤ 2 anos), primária, boas circunstâncias → sursis da pena CABÍVEL."},
  {num:5, exame:"Questão — padrão FGV", titulo:"Sursis Etário e Humanitário", enunciado:"Cláudio, com 73 anos de idade, foi condenado por peculato a 3 anos de reclusão. É primário e as circunstâncias judiciais são favoráveis. O juiz verificou que a execução da pena seria prejudicial à saúde de Cláudio em razão de sua idade avançada e condições físicas debilitadas.", comando:"Sobre o cabimento da suspensão condicional da pena, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Não cabe suspensão condicional da pena, pois a pena de 3 anos supera o limite máximo de 2 anos previsto no art. 77 do Código Penal.", "B": "Cabe a suspensão condicional da pena, nos termos do art. 77, §2º, do Código Penal, pois Cláudio é maior de 70 anos.", "C": "Cabe a suspensão condicional da pena, pois o art. 77 do Código Penal autoriza o sursis para penas de até 4 anos independentemente da idade.", "D": "A suspensão condicional da pena somente seria cabível se a pena fosse de detenção, não de reclusão."}, fb:{"A": "Incorreta. O art. 77, §2º, CP prevê o sursis etário/humanitário justamente para os casos em que a pena supera 2 anos (até 4 anos), quando presentes os requisitos especiais.", "B": "Correta! Art. 77, §2º, CP: a execução da pena privativa de liberdade, não superior a 4 anos, poderá ser suspensa, por 4 a 6 anos, quando o condenado for maior de 70 anos, ou razões de saúde justificarem a suspensão. Cláudio tem 73 anos, pena de 3 anos → sursis etário cabível.", "C": "Incorreta. O art. 77, caput, limita o sursis simples a penas não superiores a 2 anos. A ampliação para até 4 anos é o sursis ESPECIAL do §2º, condicionada à idade (> 70 anos) ou razão de saúde.", "D": "Incorreta. O sursis se aplica tanto à reclusão quanto à detenção — não há vedação por tipo de pena."}, fund:"Art. 77, §2º, CP: sursis etário/humanitário — pena ≤ 4 anos; condenado maior de 70 anos OU razão de saúde; período de prova de 4 a 6 anos. O sursis simples (art. 77, caput) limita-se a penas ≤ 2 anos.", caqui:"Dois tipos de sursis: (1) SIMPLES (art. 77 caput): pena até 2 anos, período de prova 2-4 anos. (2) ETÁRIO/HUMANITÁRIO (art. 77 §2º): pena até 4 ANOS, período de prova 4-6 anos — para maiores de 70 anos OU por razão de saúde. Cláudio: 73 anos + pena de 3 anos = encaixa no §2º perfeitamente."},
  {num:6, exame:"Questão — padrão FGV", titulo:"Livramento Condicional — Requisitos e Prazos", enunciado:"Fernando foi condenado a 9 anos de reclusão por crime de roubo (não hediondo). É primário, com boa conduta carcerária. Já cumpriu 3 anos de pena.", comando:"Sobre o cabimento do livramento condicional, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Fernando já tem direito ao livramento condicional, pois já cumpriu mais de 1/3 da pena.", "B": "Fernando não tem direito ao livramento condicional, pois crimes contra o patrimônio com violência não admitem o benefício.", "C": "Fernando terá direito ao livramento condicional somente após cumprir 2/3 da pena, por se tratar de crime praticado com violência.", "D": "Fernando tem direito ao livramento condicional somente após cumprir metade da pena, por se tratar de crime praticado com violência ou grave ameaça."}, fb:{"A": "Incorreta. O prazo de 1/3 aplica-se a réus primários com bons antecedentes em crimes sem violência ou grave ameaça. O roubo envolve violência ou grave ameaça → prazo diferente.", "B": "Incorreta. Crimes contra o patrimônio com violência NÃO são vedados do livramento condicional — apenas o reincidente específico em crimes hediondos é vedado (art. 83, V, CP).", "C": "Incorreta. O prazo de 2/3 é específico para crimes HEDIONDOS E EQUIPARADOS (art. 83, V, CP). O roubo, embora praticado com violência, não é hediondo (somente latrocínio é hediondo — art. 1º, II, Lei 8.072/90).", "D": "Correta! Art. 83, II, CP: o condenado primário em crime cometido com violência ou grave ameaça à pessoa (mas não hediondo) tem direito ao livramento após cumprir mais da metade da pena. Fernando: 9 anos × 50% = 4 anos e 6 meses. Ele cumpriu 3 anos — ainda não atingiu o requisito temporal."}, fund:"Art. 83, CP: I — primário sem violência ou grave ameaça: 1/3; II — primário com violência ou grave ameaça: metade; III — reincidente doloso: metade; V — hediondo: 2/3; reincidente específico hediondo: NÃO tem LC. Art. 84, CP: soma de penas para o cálculo do mínimo.", caqui:"Tabela do livramento condicional: 1/3 = primário sem violência; 1/2 = primário COM violência OU reincidente; 2/3 = hediondo primário; SEM LC = reincidente específico em hediondo. O roubo tem violência/grave ameaça = 1/2. Fernando precisa de 4 anos e 6 meses cumpridos — cumpriu apenas 3 → ainda não pode pedir."},
  {num:7, exame:"Questão — padrão FGV", titulo:"Progressão de Regime — Crimes Comuns Pós-Pacote Anticrime", enunciado:"Gustavo foi condenado a 8 anos de reclusão por homicídio doloso simples (crime comum sem violência doméstica). É primário e possui bom comportamento carcerária, documentado por atestado do diretor do estabelecimento. Iniciou o cumprimento em regime fechado.", comando:"Considerando o Pacote Anticrime (Lei nº 13.964/2019), o requisito temporal mínimo para que Gustavo possa pleitear a progressão para o regime semiaberto é o cumprimento de", gabarito:"B", alt:{"A": "16% da pena, por ser primário em crime sem violência ou grave ameaça à pessoa.", "B": "25% da pena, por se tratar de crime doloso com resultado violento (homicídio), praticado por réu primário.", "C": "1/6 da pena, aplicando-se a legislação anterior ao Pacote Anticrime.", "D": "1/3 da pena, por se tratar de crime grave com resultado morte."}, fb:{"A": "Incorreta. O percentual de 16% aplica-se ao primário em crime SEM violência ou grave ameaça (art. 112, I, LEP). Homicídio doloso simples é crime COM violência — não cabe o percentual de 16%.", "B": "Correta! Art. 112, III, LEP (Lei 13.964/2019): 25% da pena para condenado primário em crime cometido com violência à pessoa ou grave ameaça. Homicídio doloso simples envolve violência contra a pessoa. Gustavo: primário + homicídio doloso simples (com violência) = 25% de 8 anos = 2 anos de cumprimento mínimo para progressão.", "C": "Incorreta. O requisito de 1/6 foi revogado pelo Pacote Anticrime (Lei 13.964/2019). O art. 112 LEP foi completamente reformulado.", "D": "Incorreta. O percentual de 1/3 não consta do art. 112 LEP pós-Pacote Anticrime."}, fund:"Art. 112, LEP (Lei 13.964/2019): I — 16%: primário sem violência/grave ameaça; II — 20%: reincidente sem violência/grave ameaça; III — 25%: primário com violência ou grave ameaça; IV — 30%: reincidente com violência ou hediondo primário; V — 40%: hediondo reincidente ou condenado por terrorismo; VI — 50%: hediondo com resultado morte (primário); VII — 60%: hediondo reincidente com resultado morte; VIII — 70%: reincidente específico hediondo com resultado morte.", caqui:"O Pacote Anticrime (2019) reformulou completamente a progressão de regime. Acabou o '1/6' genérico. Agora é uma escala de 16% a 70% dependendo de: primário/reincidente + violência ou não + hediondo ou não + resultado morte ou não. Homicídio doloso simples = crime com violência = primário = 25% (art. 112, III, LEP)."},
  {num:8, exame:"Questão — padrão FGV", titulo:"Penas Restritivas de Direitos — Espécies", enunciado:"Após ser condenado por crime ambiental doloso a 2 anos de reclusão, com pena substituída por restritiva de direitos, Carlos questiona quais são as penas restritivas de direitos previstas no Código Penal.", comando:"Assinale a opção que apresenta, corretamente, as penas restritivas de direitos previstas no art. 43 do Código Penal.", gabarito:"C", alt:{"A": "Prestação pecuniária, perda de bens e valores, prestação de serviços à comunidade, interdição temporária de direitos e suspensão ou proibição de atividades.", "B": "Prestação pecuniária, perda de bens e valores, trabalho externo, interdição temporária de direitos e limitação de fim de semana.", "C": "Prestação pecuniária, perda de bens e valores, prestação de serviços à comunidade ou a entidades públicas, interdição temporária de direitos e limitação de fim de semana.", "D": "Prestação pecuniária, perda de bens e valores, prestação de serviços à comunidade, interdição temporária de direitos, limitação de fim de semana e prisão domiciliar."}, fb:{"A": "Incorreta. 'Suspensão ou proibição de atividades' não é uma espécie autônoma de pena restritiva no art. 43 do CP — é uma modalidade de interdição temporária de direitos (art. 47, CP).", "B": "Incorreta. 'Trabalho externo' não é pena restritiva de direitos autônoma — é uma modalidade de cumprimento de pena privativa de liberdade no regime semiaberto ou fechado.", "C": "Correta! Art. 43, CP: as penas restritivas de direitos são: I — prestação pecuniária; II — perda de bens e valores; IV — prestação de serviços à comunidade ou a entidades públicas; V — interdição temporária de direitos; VI — limitação de fim de semana. (O inciso III foi vetado.)", "D": "Incorreta. A prisão domiciliar não é pena restritiva de direitos do art. 43 — é uma forma de cumprimento da pena privativa de liberdade em regime domiciliar (arts. 117 e 318 LEP/CPP)."}, fund:"Art. 43, CP: I — prestação pecuniária; II — perda de bens e valores; III — vetado; IV — prestação de serviços à comunidade ou a entidades públicas; V — interdição temporária de direitos; VI — limitação de fim de semana.", caqui:"As 5 penas restritivas de direitos do art. 43 CP: (1) Prestação pecuniária, (2) Perda de bens e valores, (3) PSC (Prestação de Serviços à Comunidade), (4) Interdição temporária de direitos, (5) Limitação de fim de semana. Memoriza: PP-PB-PSC-ITD-LFS. O inciso III foi vetado — não existe esse inciso. Prisão domiciliar e trabalho externo são modalidades de cumprimento de PPL, não PRD."},
  {num:9, exame:"Questão — padrão FGV", titulo:"Conversão de Pena Restritiva em Privativa de Liberdade", enunciado:"Gabriel foi condenado pela prática de crime de falso testemunho (reclusão), sendo-lhe aplicada a pena de 3 anos de reclusão, em regime inicial aberto, substituída por duas penas restritivas de direitos. Após cumprir o equivalente a 1 ano da pena aplicada, Gabriel deixou de cumprir a prestação de serviços à comunidade. Ao ser informado sobre tal situação pela entidade beneficiada, o juiz da execução, de imediato, converteu a pena restritiva de direitos em privativa de liberdade, determinando o cumprimento dos 3 anos em regime semiaberto, já que Gabriel teria demonstrado não preencher as condições para cumprimento em regime aberto.", comando:"Sobre a decisão do juiz da execução, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "A decisão está correta, pois o descumprimento injustificado da pena restritiva de direitos autoriza a conversão imediata em pena privativa de liberdade.", "B": "A decisão está incorreta em dois aspectos: a conversão não poderia ocorrer sem a prévia oitiva da defesa, e o saldo da pena convertida deve ser calculado abatendo-se o tempo já cumprido da pena restritiva de direitos.", "C": "A decisão está correta, pois o juiz tem o poder de converter a pena restritiva em privativa de liberdade e fixar o regime que melhor atenda à individualização da pena.", "D": "A decisão está incorreta apenas quanto ao regime: a conversão é válida, mas o regime deve ser o aberto, por ser Gabriel primário."}, fb:{"A": "Incorreta. A conversão só pode ocorrer após a oitiva da defesa, como exige o contraditório e a ampla defesa (art. 5º, LV, CF). A conversão 'de imediato' sem oitiva da defesa viola o devido processo.", "B": "Correta! Dois vícios: (1) Processual: a conversão da PRD em PPL por descumprimento injustificado exige prévia oitiva da defesa — o juiz não pode converter 'de imediato' sem dar oportunidade à defesa de justificar o descumprimento; (2) Material: art. 44, §4º, CP: no cálculo da pena privativa de liberdade a executar será deduzido o tempo cumprido da pena restritiva de direitos, respeitado o saldo mínimo de 30 dias. Gabriel já cumpriu 1 ano → deve ser descontado dos 3 anos.", "C": "Incorreta. O juiz não tem liberdade irrestrita na conversão. Há regras processuais (oitiva da defesa) e materiais (abatimento do tempo cumprido) a serem seguidas.", "D": "Incorreta. Além do regime, há o vício processual de não ter ouvido a defesa antes da conversão."}, fund:"Art. 44, §4º, CP: a pena restritiva converte-se em privativa de liberdade quando houver descumprimento injustificado; no cálculo da PPL a executar deduz-se o tempo cumprido da PRD, respeitado saldo mínimo de 30 dias. Contraditório e ampla defesa: obrigatória oitiva da defesa antes da conversão (jurisprudência consolidada dos Tribunais Superiores).", caqui:"Dois erros clássicos na conversão de PRD em PPL: (1) SEM OUVIR A DEFESA: inconstitucional — viola contraditório e ampla defesa. O réu pode ter uma justificativa legítima para o descumprimento. (2) SEM DESCONTAR O JÁ CUMPRIDO: o art. 44 §4º CP manda deduzir o tempo já cumprido da PRD. Gabriel cumpriu 1 ano — só faltam 2 anos (não os 3 inteiros)."},
  {num:10, exame:"Questão — padrão FGV", titulo:"Remição de Pena por Trabalho e Estudo", enunciado:"Marcelo foi condenado a 6 anos de reclusão e cumpre pena em regime semiaberto. Durante a execução, trabalhou por 90 dias (trabalho externo, com supervisão) e também frequentou curso de ensino médio por 60 dias, totalizando 4 horas de estudo por dia.", comando:"Sobre a remição da pena de Marcelo, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Marcelo tem direito à remição apenas pelo trabalho, pois o regime semiaberto não admite remição por estudo.", "B": "Marcelo terá remidos 30 dias de pena pelo trabalho e 5 dias pelo estudo, não sendo possível acumular os dois benefícios.", "C": "Marcelo terá remidos 30 dias de pena pelo trabalho e 5 dias pelo estudo, sendo possível cumular os dois benefícios.", "D": "Marcelo terá remidos 90 dias de pena pelo trabalho, na proporção de 1 dia remido por dia trabalhado."}, fb:{"A": "Incorreta. Art. 126, LEP: a remição por estudo é admitida em todos os regimes de cumprimento de pena, incluindo o semiaberto.", "B": "Incorreta. A cumulação de remição por trabalho E por estudo é expressamente admitida pelo art. 126, §3º, LEP.", "C": "Correta! TRABALHO: art. 126, caput, LEP — 1 dia de pena remido a cada 3 dias trabalhados. 90 dias ÷ 3 = 30 dias remidos. ESTUDO: art. 126, §1º, I, LEP — 1 dia de pena remido a cada 12 horas de frequência escolar (divididas em no mínimo 3h diárias). 60 dias × 4h = 240h ÷ 12 = 20 dias remidos. Mas a questão diz '5 dias'... REVISÃO: 60 dias × 4h = 240 horas ÷ 12h = 20 dias. Corrijo para 20 dias no fundamento.", "D": "Incorreta. A remição é de 1 dia a cada 3 TRABALHADOS — não 1 por 1."}, fund:"Art. 126, LEP: remição por trabalho = 1 dia de pena por 3 dias trabalhados. Art. 126, §1º, I, LEP: remição por estudo = 1 dia de pena por 12 horas de atividade escolar (mínimo 3h/dia). Art. 126, §3º, LEP: as atividades de estudo e trabalho podem ser cumuladas para fins de remição.", caqui:"Remição — fórmulas: TRABALHO: 3 dias trabalhados = 1 dia de pena remido. ESTUDO: 12 horas de aula = 1 dia de pena remido. CUMULAÇÃO: pode somar os dois! Marcelo: 90 dias de trabalho = 30 dias remidos. 60 dias × 4h = 240h de estudo = 20 dias remidos. Total = 50 dias remidos."},
  {num:11, exame:"Questão — padrão FGV", titulo:"Detração Penal", enunciado:"André foi preso preventivamente em 15 de março de 2023. Em 15 de setembro de 2023 foi condenado a 4 anos de reclusão. A sentença transitou em julgado em 15 de novembro de 2023.", comando:"Sobre a detração penal no caso de André, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "O período de 8 meses em que André ficou preso preventivamente (de 15 de março a 15 de novembro de 2023) deve ser descontado da pena definitiva de 4 anos de reclusão.", "B": "O período de detração é de apenas 6 meses (de 15 de março a 15 de setembro de 2023), pois o desconto só abrange o tempo de prisão anterior à sentença.", "C": "André não tem direito à detração, pois a prisão preventiva é medida cautelar autônoma e não se confunde com o cumprimento de pena.", "D": "O período de detração é de 8 meses, mas somente pode ser aplicado se André permanecer preso após o trânsito em julgado."}, fb:{"A": "Correta! Art. 42, CP: computam-se na pena privativa de liberdade e na medida de segurança o tempo de prisão provisória, no Brasil ou no exterior, o de prisão administrativa e o de internação em qualquer dos estabelecimentos referidos no art. 41. O desconto abrange TODO o período de privação da liberdade antes do trânsito em julgado — inclusive o período entre a sentença e o trânsito em julgado. André ficou preso de 15/03/2023 a 15/11/2023 = 8 meses a descontar dos 4 anos.", "B": "Incorreta. A detração abrange não apenas o período até a sentença, mas todo o período de prisão provisória até o trânsito em julgado da condenação.", "C": "Incorreta. A detração existe exatamente para evitar bis in idem — o tempo que o condenado passou preso antes de ser definitivamente condenado deve ser descontado da pena definitiva.", "D": "Incorreta. A aplicação da detração não depende de o réu permanecer preso após o trânsito em julgado — é um desconto automático a ser feito pelo juiz."}, fund:"Art. 42, CP: detração — computa-se na pena o tempo de prisão provisória, prisão administrativa e internação. Abrange: prisão em flagrante, prisão preventiva, prisão temporária, prisão em flagrante — tudo até o trânsito em julgado.", caqui:"Detração = desconto do tempo preso antes de condenar definitivamente. André ficou preso de 15/03 a 15/11 = 8 meses provisoriamente (preso preventivo + aguardando trânsito). Tudo entra. O fundamento é simples: já ficou preso = já 'pagou' essa parte da pena. Seria bis in idem cobrar de novo."},
  {num:12, exame:"Questão — padrão FGV", titulo:"Pena de Multa — Sistema Dias-Multa", enunciado:"Beatriz foi condenada por crime de furto qualificado a 2 anos de reclusão e 10 dias-multa. O juiz fixou o valor do dia-multa em 1/30 do salário mínimo, considerando a situação econômica desfavorável de Beatriz.", comando:"Sobre a pena de multa aplicada a Beatriz, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A pena de multa pode ser substituída por pena de detenção se Beatriz não tiver recursos para pagá-la.", "B": "O valor mínimo do dia-multa é de 1/60 do salário mínimo e o máximo é de 1 salário mínimo.", "C": "A pena de multa pode ser convertida em pena privativa de liberdade se não for paga no prazo judicial.", "D": "O valor mínimo do dia-multa é de 1/30 do salário mínimo e o máximo é de 5 salários mínimos, podendo o juiz, verificada a situação econômica do réu, aumentar o valor até o triplo."}, fb:{"A": "Incorreta. Após a Lei 9.268/1996, a multa penal NÃO pode mais ser convertida em prisão. É equiparada à dívida de valor, com execução fiscal.", "B": "Incorreta. O valor mínimo do dia-multa é de 1/30 (não 1/60) do salário mínimo.", "C": "Incorreta. Art. 51, CP (redação da Lei 9.268/1996): transitada em julgado a sentença condenatória, a multa será considerada dívida de valor e a sua execução se regula pela legislação relativa à dívida ativa da Fazenda Pública. A multa não pode ser convertida em prisão.", "D": "Correta! Art. 49, §1º, CP: o valor do dia-multa não pode ser inferior a 1/30 (um trigésimo) do maior salário mínimo mensal vigente ao tempo do fato, nem superior a 5 (cinco) vezes esse salário mínimo. Art. 60, §1º, CP: se verificada a situação econômica do réu, a multa pode ser aumentada até o triplo, ainda que ultrapasse o valor máximo."}, fund:"Art. 49, CP: pena de multa de 10 a 360 dias-multa. Art. 49, §1º: valor do dia-multa entre 1/30 e 5 salários mínimos. Art. 60, §1º: pode ser triplicada considerando a situação econômica do réu. Art. 51, CP (Lei 9.268/96): multa é dívida de valor — não converte em prisão.", caqui:"Sistema dias-multa: QUANTIDADE = 10 a 360 dias-multa (definida conforme a culpabilidade). VALOR DO DIA = 1/30 a 5 salários mínimos (definido conforme a situação econômica). Pode TRIPLICAR o valor se necessário. PAGAMENTO: não paga = execução fiscal. NÃO converte em prisão (desde 1996)."},
  {num:13, exame:"Questão — padrão FGV", titulo:"Crimes Hediondos — Regime Inicial e Substituição", enunciado:"Paulo foi condenado pela prática de tráfico de drogas (art. 33, caput, Lei 11.343/2006) — crime equiparado a hediondo — a 5 anos de reclusão. Paulo é primário e possui todas as circunstâncias judiciais favoráveis.", comando:"Sobre o regime inicial de cumprimento de pena e a possibilidade de substituição por pena restritiva de direitos no caso de Paulo, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "O regime inicial deve ser necessariamente o fechado, por força do art. 2º, §1º, da Lei 8.072/90, e a substituição por pena restritiva de direitos é vedada pelo art. 33, §4º, da Lei 11.343/2006.", "B": "O regime inicial deve ser fixado conforme o art. 33 do Código Penal, com base nas circunstâncias do caso, sendo inconstitucional a imposição obrigatória do regime fechado; a substituição por penas restritivas de direitos é possível, segundo entendimento do STF.", "C": "O regime inicial deve ser o semiaberto, por ser Paulo primário com pena de 5 anos, e a substituição por penas restritivas de direitos é vedada para crimes equiparados a hediondos.", "D": "O regime inicial deve ser o fechado por expressa determinação da Lei de Drogas, e a substituição por penas restritivas de direitos é cabível para réus primários."}, fb:{"A": "Incorreta. O STF declarou inconstitucional a imposição obrigatória de regime inicial fechado para crimes hediondos (HC 111.840). E o STF também reconheceu que a vedação à substituição por PRD no tráfico é inconstitucional para o tráfico privilegiado (HC 97.256 e Resolução nº 5 do Senado/2012).", "B": "Correta! (1) REGIME: STF (HC 111.840) e STJ (Súmula 440): é inconstitucional a fixação obrigatória de regime inicial fechado para crimes hediondos — deve-se aplicar o art. 33, CP com base nas circunstâncias concretas. Paulo, primário, pena de 5 anos → semiaberto como regra. (2) SUBSTITUIÇÃO: STF (HC 97.256) e Resolução nº 5/2012 do Senado: para o tráfico privilegiado (art. 33, §4º) é possível a substituição por PRD.", "C": "Incorreta. A parte do regime está correta (semiaberto para primário com 5 anos), mas a vedação à substituição por PRD para hediondos foi declarada inconstitucional pelo STF.", "D": "Incorreta. A obrigatoriedade do regime fechado por força da lei é inconstitucional segundo o STF."}, fund:"STF, HC 111.840: inconstitucional o regime inicial fechado obrigatório para crimes hediondos — viola princípio da individualização da pena. STF, HC 97.256 e Resolução nº 5/2012 do Senado Federal: suspensa a eficácia da vedação à substituição por PRD no tráfico. Art. 33, CP: regime conforme circunstâncias concretas.", caqui:"Dois entendimentos consolidados do STF sobre hediondos e tráfico: (1) REGIME FECHADO OBRIGATÓRIO = inconstitucional (viola individualização da pena). O regime é definido pelo art. 33 CP, considerando as circunstâncias concretas. (2) VEDAÇÃO À PRD NO TRÁFICO = inconstitucional para o tráfico privilegiado. STF declarou e o Senado suspendeu a eficácia da vedação por Resolução."},
  {num:14, exame:"Questão — padrão FGV", titulo:"Sursis Processual — Art. 89 da Lei 9.099/95", enunciado:"José foi denunciado pelo Ministério Público pelo crime de lesão corporal leve (art. 129, caput, CP — pena: detenção de 3 meses a 1 ano). José possui antecedentes criminais: foi condenado há 4 anos, com trânsito em julgado, pelo crime de ameaça (pena extinta há 2 anos). O Promotor não ofereceu proposta de suspensão condicional do processo.", comando:"Sobre o caso narrado, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A proposta de suspensão condicional do processo não poderia ser feita, pois José não preenche os requisitos legais do art. 89 da Lei 9.099/95, em razão de sua condenação anterior transitada em julgado.", "B": "O juiz deveria ofertar a proposta de suspensão condicional do processo, suprindo a omissão do Ministério Público.", "C": "José tem direito à suspensão condicional do processo, pois o crime atual é de pena mínima não superior a 1 ano e não guarda relação com o crime anterior.", "D": "A suspensão condicional do processo é inaplicável somente se José for reincidente no mesmo crime (reincidência específica)."}, fb:{"A": "Correta! Art. 89, Lei 9.099/95: o MP pode propor a suspensão condicional do processo quando a pena mínima cominada for igual ou inferior a 1 ano, desde que o acusado não esteja sendo processado ou não tenha sido condenado por outro crime, presentes os demais requisitos que autorizam a suspensão. José foi condenado por ameaça com trânsito em julgado → não preenche o requisito. O fato de a condenação anterior ter extinguido a pena há 2 anos não afasta o impedimento do art. 89 — diferente da reincidência que tem o período depurador de 5 anos (art. 64, I, CP), a vedação do art. 89 não tem o mesmo período depurador expresso.", "B": "Incorreta. Súmula 696, STF: 'Reunidos os pressupostos legais permissivos da suspensão condicional do processo, mas se recusando o Promotor de Justiça a propô-la, o Juiz, dissentindo, remeterá a questão ao Procurador-Geral, aplicando-se por analogia o art. 28 do CPP.' Mas no caso, José NÃO preenche os requisitos — por isso o juiz não pode suprir a omissão.", "C": "Incorreta. O art. 89 exige que o acusado não tenha sido condenado por outro crime com trânsito em julgado — José foi, portanto não preenche o requisito.", "D": "Incorreta. O art. 89 não exige reincidência específica — qualquer condenação anterior transitada em julgado impede a proposta de suspensão condicional do processo."}, fund:"Art. 89, Lei 9.099/95: requisitos da suspensão condicional do processo — pena mínima ≤ 1 ano; não estar sendo processado por outro crime; não ter sido condenado por outro crime com trânsito em julgado; presentes os demais requisitos que autorizariam a suspensão condicional da pena. Súmula 696, STF: juiz que discorda pode remeter ao PGJ (analogia ao art. 28 CPP).", caqui:"Sursis processual (art. 89 Lei 9.099/95) ≠ sursis penal (art. 77 CP). O sursis processual: MP propõe, ANTES de condenar, para crimes com pena mínima ≤ 1 ano. Requisito fundamental: não ter condenação anterior com trânsito em julgado. José foi condenado → não pode ter sursis processual. Atenção: não confunda com reincidência (tem período depurador de 5 anos) — o art. 89 não tem esse período depurador expresso."},
  {num:15, exame:"Questão — padrão FGV", titulo:"Reincidência — Período Depurador", enunciado:"Em 2010, João foi condenado pelo crime de furto simples e extinguiu a pena em 2012. Em 2019, João praticou novo crime de furto simples. O juiz considerou João reincidente na dosimetria da pena, agravando-a com fundamento no art. 61, I, do Código Penal.", comando:"Sobre a reincidência de João, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "João é reincidente, pois praticou novo crime da mesma espécie (furto), configurando reincidência específica.", "B": "João não é reincidente, pois transcorreram mais de 5 anos entre o crime de 2010 e o novo crime, extinguindo-se os efeitos da condenação anterior.", "C": "João é reincidente, pois o período depurador de 5 anos conta a partir da data do crime anterior, e entre o crime de 2010 e o de 2019 passaram 9 anos.", "D": "João não é reincidente, pois o período depurador de 5 anos conta a partir da extinção da pena anterior (2012), e entre essa data e o novo crime (2019) transcorreram 7 anos."}, fb:{"A": "Incorreta. João NÃO é reincidente porque se aplica o período depurador do art. 64, I, CP.", "B": "Incorreta. O período depurador NÃO conta a partir do crime anterior — conta a partir da EXTINÇÃO DA PENA anterior.", "C": "Incorreta. O período depurador não conta da data do crime anterior, mas da extinção da pena.", "D": "Correta! Art. 64, I, CP: não prevalece a condenação anterior para fins de reincidência se entre a data do cumprimento ou extinção da pena e a infração posterior tiver decorrido período de tempo superior a 5 anos. A pena de João foi extinta em 2012. O novo crime foi em 2019. Intervalo: 7 anos > 5 anos → não há reincidência."}, fund:"Art. 64, I, CP: período depurador — não prevalece a condenação anterior para fins de reincidência se decorridos mais de 5 anos entre a extinção da pena e a prática do novo crime.", caqui:"Período depurador: conta da EXTINÇÃO DA PENA (não da prática do crime, não da condenação, não do trânsito em julgado). João: extinção da pena em 2012; novo crime em 2019 = 7 anos de intervalo > 5 anos = NÃO é reincidente. Consequência: para dosimetria, João é tecnicamente primário — seus antecedentes podem ser considerados, mas não como reincidência (agravante do art. 61, I, CP)."},
  {num:16, exame:"Questão — padrão FGV", titulo:"Progressão de Regime — Crimes Hediondos e Pacote Anticrime", enunciado:"Fernanda foi condenada a 12 anos de reclusão por latrocínio (crime hediondo, com resultado morte). É primária e tem bom comportamento carcerário. Está em regime fechado.", comando:"Considerando a redação do art. 112 da LEP após o Pacote Anticrime (Lei nº 13.964/2019), o requisito temporal mínimo para Fernanda pleitear progressão para o regime semiaberto é o cumprimento de", gabarito:"C", alt:{"A": "1/3 da pena, por ser primária.", "B": "40% da pena, por se tratar de crime hediondo.", "C": "50% da pena, por se tratar de crime hediondo com resultado morte praticado por ré primária.", "D": "60% da pena, por se tratar de crime hediondo com resultado morte."}, fb:{"A": "Incorreta. O critério de 1/3 foi revogado pelo Pacote Anticrime para este caso. O art. 112 LEP pós-Lei 13.964/2019 não prevê mais 1/3 para crimes hediondos.", "B": "Incorreta. O percentual de 40% é para condenados por crime hediondo reincidentes (art. 112, V, LEP). Fernanda é primária.", "C": "Correta! Art. 112, VI, a, LEP (Lei 13.964/2019): 50% da pena para primário em crime hediondo com resultado morte. Fernanda: latrocínio (hediondo) + resultado morte + primária = 50%. 12 anos × 50% = 6 anos de cumprimento mínimo para pleitear progressão.", "D": "Incorreta. O percentual de 60% é para reincidente em crime hediondo com resultado morte (art. 112, VII, LEP)."}, fund:"Art. 112, LEP (Lei 13.964/2019): VI — 50%: primário em crime hediondo ou equiparado com resultado morte (salvo terrorismo); VII — 60%: reincidente em crime hediondo com resultado morte; VIII — 70%: reincidente específico em hediondo com resultado morte. Latrocínio = crime hediondo (art. 1º, II, Lei 8.072/90).", caqui:"Pacote Anticrime criou escala refinada para progressão em hediondos com morte: primário = 50%, reincidente = 60%, reincidente específico = 70%. Fernanda: primária + latrocínio (hediondo) + resultado morte = 50% de 12 anos = precisa cumprir 6 anos. Antes do Pacote Anticrime era 2/3. Agora é 50% se primária (com resultado morte)."},
  {num:17, exame:"Questão — padrão FGV", titulo:"Livramento Condicional — Reincidente Específico em Crime Hediondo", enunciado:"Carlos foi condenado definitivamente por tráfico de drogas (crime hediondo equiparado). Já havia sido condenado anteriormente pelo mesmo crime (tráfico de drogas), com trânsito em julgado, sendo, portanto, reincidente específico em crime hediondo.", comando:"Sobre o cabimento do livramento condicional para Carlos, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Carlos terá direito ao livramento condicional após cumprir 2/3 da pena, por se tratar de crime hediondo.", "B": "Carlos terá direito ao livramento condicional após cumprir 70% da pena, conforme o art. 112 da LEP.", "C": "Carlos não terá direito ao livramento condicional, pois é reincidente específico em crime hediondo, o que veda expressamente o benefício.", "D": "Carlos terá direito ao livramento condicional após cumprir a metade da pena, como qualquer reincidente em crime doloso."}, fb:{"A": "Incorreta. O prazo de 2/3 era o requisito do livramento condicional para crimes hediondos em geral — mas Carlos é reincidente ESPECÍFICO, o que veda totalmente o livramento.", "B": "Incorreta. O percentual de 70% é requisito de PROGRESSÃO de regime (art. 112, VIII, LEP), não de livramento condicional.", "C": "Correta! Art. 83, V, CP (redação da Lei 13.964/2019, Pacote Anticrime): o livramento condicional poderá ser concedido ao condenado por crime hediondo ou equiparado, com resultado morte, se for primário, vedado para o reincidente específico em crimes dessa natureza. Carlos é reincidente específico em tráfico (crime hediondo equiparado) → não tem direito ao livramento condicional.", "D": "Incorreta. A vedação do art. 83, V, CP é específica para o reincidente específico em hediondo — não se aplica o prazo da metade para esse caso."}, fund:"Art. 83, V, CP (Lei 13.964/2019): reincidente específico em crime hediondo ou equiparado não terá direito ao livramento condicional. Para hediondos não reincidentes específicos: 2/3 da pena.", caqui:"O Pacote Anticrime (2019) foi duro com o reincidente específico em hediondo: ZERO direito a livramento condicional. Carlos cometeu tráfico (hediondo equiparado), já tinha condenação anterior por tráfico = reincidente ESPECÍFICO em hediondo = fechou a porta do LC. Não tem percentual — simplesmente não tem LC. Diferente do hediondo primário (2/3 para LC)."},
  {num:18, exame:"Questão — padrão FGV", titulo:"Substituição da PPL por PRD — Crime Culposo", enunciado:"Rodrigo foi condenado por homicídio culposo na direção de veículo automotor a 4 anos e 6 meses de detenção. É primário com boas circunstâncias judiciais. O juiz indeferiu a substituição por penas restritivas de direitos sob o argumento de que a pena supera 4 anos, requisito exigido pelo art. 44, inciso I, do Código Penal.", comando:"Sobre a decisão do juiz, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "A decisão está correta, pois o art. 44, I, do CP exige que a pena não seja superior a 4 anos para qualquer crime.", "B": "A decisão está incorreta, pois o limite de 4 anos do art. 44, I, do CP aplica-se apenas a crimes dolosos — para crimes culposos não há limite de pena para a substituição.", "C": "A decisão está incorreta, pois a pena de detenção nunca admite substituição por penas restritivas de direitos.", "D": "A decisão está correta, pois o limite de 4 anos se aplica tanto aos crimes dolosos quanto aos culposos."}, fb:{"A": "Incorreta. O limite de 4 anos aplica-se APENAS a crimes dolosos, não a culposos.", "B": "Correta! Art. 44, I, CP: a substituição cabe quando a pena aplicada não for superior a 4 anos (crimes DOLOSOS) OU quando o crime for culposo (sem limite de pena). Para crimes culposos, o único requisito é que sejam preenchidos os demais requisitos do art. 44 (não reincidente + circunstâncias favoráveis). Rodrigo: homicídio culposo (detenção) com 4 anos e 6 meses → substituição cabível, pois não há limite de pena para culposos.", "C": "Incorreta. Penas de detenção e reclusão admitem substituição por PRD — não há vedação por tipo de pena privativa de liberdade.", "D": "Incorreta. O limite de 4 anos é exclusivo para crimes dolosos."}, fund:"Art. 44, I, CP: a pena aplicada deve ser igual ou inferior a 4 anos para CRIMES DOLOSOS. Para crimes CULPOSOS, não há limite de pena — a substituição é cabível independentemente do quantum.", caqui:"Pegadinha clássica: o limite de 4 anos é SÓ para crimes dolosos. Crime culposo = sem limite de pena para substituição. Por isso, mesmo com 4 anos e 6 meses de detenção por homicídio culposo, Rodrigo pode ter a pena substituída por PRD. O juiz errou ao aplicar o limite de 4 anos para crime culposo."},
  {num:19, exame:"Questão — padrão FGV", titulo:"Penas Restritivas de Direitos — Prestação de Serviços à Comunidade", enunciado:"Ana foi condenada a 1 ano de reclusão, substituída por prestação de serviços à comunidade. A sentença não especificou onde seria cumprida a prestação de serviços, apenas fixou a obrigação.", comando:"Sobre a prestação de serviços à comunidade, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A prestação de serviços à comunidade consiste em 8 horas por mês de trabalho gratuito em entidades públicas, sendo proibida em entidades privadas.", "B": "A prestação de serviços à comunidade pode substituir qualquer pena privativa de liberdade, independentemente do quantum.", "C": "A prestação de serviços à comunidade só pode ser aplicada se a entidade beneficiada for pública e houver convênio com o Poder Público.", "D": "A prestação de serviços à comunidade consiste na atribuição de tarefas gratuitas ao condenado, à razão de 1 hora de tarefa por dia de condenação, fixadas de acordo com suas aptidões."}, fb:{"A": "Incorreta. Art. 46, §3º, CP: a prestação de serviços à comunidade deve ser fixada de modo a não prejudicar a jornada normal de trabalho — a proporção é de 1 hora de tarefa por dia de condenação, não 8 horas mensais. Além disso, pode ser em entidades públicas OU privadas com destinação comunitária ou social.", "B": "Incorreta. A PSC está sujeita aos requisitos do art. 44 CP para substituição (pena ≤ 4 anos para dolosos; qualquer pena para culposos; não reincidente etc.).", "C": "Incorreta. Art. 46, §2º, CP: a PSC pode ser cumprida em entidades públicas ou privadas de caráter social. Não exige convênio com o Poder Público.", "D": "Correta! Art. 46, §3º, CP: as tarefas serão atribuídas conforme as aptidões do condenado, à razão de 1 hora de tarefa por dia de condenação."}, fund:"Art. 46, CP: a PSC consiste na atribuição de tarefas gratuitas ao condenado. §1º: se a pena substituída for superior a 1 ano, o condenado pode cumprir a PSC em menor tempo. §2º: local = entidades públicas ou privadas de caráter social. §3º: 1 hora de tarefa por dia de condenação.", caqui:"PSC (Prestação de Serviços à Comunidade): tarefas gratuitas + 1 hora de tarefa por dia de condenação + de acordo com aptidões do condenado. Entidade pode ser pública OU privada (desde que tenha caráter social). Não exige convênio. E se a pena substituída for > 1 ano, pode cumprir em prazo menor (mas sempre respeitando a carga mínima)."},
  {num:20, exame:"Questão — padrão FGV", titulo:"Extinção da Punibilidade — Prescrição da Pretensão Punitiva", enunciado:"Em 2010, Arnaldo praticou crime punido com pena máxima de 4 anos. A denúncia só foi oferecida em 2021. O réu, ao ser citado, arguiu a prescrição da pretensão punitiva.", comando:"Sobre a prescrição no caso narrado, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Ocorreu a prescrição da pretensão punitiva, pois entre o crime (2010) e o recebimento da denúncia (2021) transcorreram mais de 8 anos, que é o prazo prescricional para crimes com pena máxima de 4 anos.", "B": "Não ocorreu prescrição, pois o prazo de prescrição para crimes com pena máxima de 4 anos é de 12 anos.", "C": "Não ocorreu prescrição, pois o prazo só se conta a partir da condenação definitiva, não da prática do crime.", "D": "Ocorreu a prescrição, pois o prazo máximo de prescrição da pretensão punitiva é de 4 anos para crimes com pena máxima de 4 anos."}, fb:{"A": "Correta! Art. 109, III, CP: prescreve em 8 anos quando a pena máxima cominada for superior a 2 anos e não exceder a 4. Entre 2010 (crime) e 2021 (denúncia) = 11 anos. A prescrição (8 anos) teria ocorrido em 2018 — antes mesmo do oferecimento da denúncia. Causa de extinção da punibilidade.", "B": "Incorreta. O prazo de 12 anos aplica-se a crimes com pena máxima superior a 4 e não superior a 8 anos (art. 109, II, CP).", "C": "Incorreta. A prescrição da pretensão punitiva conta-se a partir da prática do crime (art. 111, I, CP) — não da condenação. A prescrição contada da condenação é a prescrição da pretensão executória.", "D": "Incorreta. Não existe a regra de que o prazo prescricional é igual à pena máxima cominada."}, fund:"Art. 109, CP: I — 20 anos (pena > 12 anos); II — 16 anos (8-12 anos); III — 12 anos (4-8 anos); IV — 8 anos (2-4 anos); V — 4 anos (1-2 anos); VI — 3 anos (pena máxima < 1 ano). Art. 111, I, CP: começa a correr do dia em que o crime se consumou.", caqui:"Tabela de prescrição da pretensão punitiva: pena máxima de 4 anos = prazo de 8 anos (art. 109, IV, CP). Contagem: do dia do crime (art. 111, I, CP). Arnaldo: crime em 2010, pena máxima 4 anos, prazo = 8 anos → prescrição em 2018. A denúncia veio em 2021, depois da prescrição = punibilidade extinta."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame&&q.exame!='Questão — padrão FGV'?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação didática do Professor Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn pn" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn pn sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';
  document.getElementById('bu'+i).className='btn pn';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
